# Supabase project config
# Este arquivo define config por função. O default do Supabase é verify_jwt = true.
# Só listamos aqui as funções que PRECISAM ficar com verify_jwt = false.
#
# CLASSIFICAÇÃO:
# 1. WEBHOOKS — quem chama é sistema externo (não manda JWT do Supabase)
# 2. ENDPOINTS PÚBLICOS — chamados por páginas sem login (quiz, NPS, PWA evento)
# 3. CRONS / SCHEDULERS — chamados pelo pg_cron/scheduler sem user context
#
# REGRA DE OURO:
# - Default (não listado aqui) = verify_jwt = true (seguro por padrão)
# - Se função precisa ser pública → listar abaixo na categoria correta
# - Se desativa JWT, precisa implementar auth custom (API key, HMAC, validação interna)

project_id = "seu-projeto-aqui"

# ============================================================
# WEBHOOKS EXTERNOS — JWT não se aplica (fontes externas)
# ============================================================

[functions.process-email-event]
verify_jwt = false

[functions.wavoip-webhook]
verify_jwt = false

[functions.whatsapp-webhook]
verify_jwt = false

# Chamada internamente pelo ai-sales-agent via fetch SEM header de auth → precisa
# de no-verify-jwt (senão o gateway barra com 401 e o agente não envia Cloud API).
[functions.send-whatsapp-cloud]
verify_jwt = false

# Chamada do browser (mint de token Soniox); deploy sem verify_jwt por design.
[functions.soniox-token]
verify_jwt = false

[functions.whatsapp-cloud-webhook]
verify_jwt = false

[functions.google-calendar-webhook]
verify_jwt = false

[functions.unsubscribe]
verify_jwt = false

# PWA do participante de evento (auth próprio via session token)
[functions.book-meeting]
verify_jwt = false

# Página pública de NPS (/nps/:token)
[functions.health-check]
verify_jwt = false

# ============================================================
# CRONS / SCHEDULERS — chamados pelo pg_cron sem user context
# ============================================================

# Agentes IA automáticos
[functions.ai-sales-agent]
verify_jwt = false

# Disparo de campanhas: processa campanhas WhatsApp em 'sending' (cron 1min)
