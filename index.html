<!doctype html>
<html lang="pt-BR">
  <head>
    <script>if(typeof global==="undefined"){window.global=window;}</script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>TotexGest</title>
    <meta name="description" content="CRM com Inteligência Artificial para Gestão de Vendas" />
    <meta name="author" content="TotexGest" />
    <link rel="icon" type="image/png" href="/logosvgtotex.png" />
    <link rel="shortcut icon" href="/logosvgtotex.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logosvgtotex.png" />
    <link rel="manifest" id="dynamic-manifest" href="/manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <meta property="og:title" content="TotexGest" />
    <meta property="og:description" content="CRM com Inteligência Artificial para Gestão de Vendas" />
    <meta property="og:type" content="website" />

    <meta name="twitter:card" content="summary_large_image" />

  </head>

  <body>
    <div id="root"></div>
    <!--
      Guarda de configuracao — roda ANTES do bundle principal. O Vite injeta os
      valores das variaveis de ambiente do Supabase no build. Se o deploy (ex:
      Vercel) subir sem essas variaveis, o bundle quebra em tela branca com um
      erro disfarcado ("Export not defined in module"). Este script detecta a
      causa real antes disso e mostra uma mensagem clara em vez de tela branca.
    -->
    <script>
      (function () {
        var url = "%VITE_SUPABASE_URL%";
        var key = "%VITE_SUPABASE_ANON_KEY%";
        function ausente(v) { return !v || v.charAt(0) === "%"; }
        var faltando = [];
        if (ausente(url)) faltando.push("VITE_SUPABASE_URL");
        if (ausente(key)) faltando.push("VITE_SUPABASE_ANON_KEY");
        if (faltando.length) {
          var root = document.getElementById("root");
          if (root) {
            root.innerHTML =
              '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0b0b0f;color:#e5e7eb;font-family:system-ui,-apple-system,sans-serif;padding:24px;box-sizing:border-box;">' +
                '<div style="max-width:540px;text-align:center;">' +
                  '<div style="font-size:40px;margin-bottom:12px;">&#9881;&#65039;</div>' +
                  '<h1 style="font-size:20px;font-weight:700;margin:0 0 8px;">Configura&ccedil;&atilde;o ausente</h1>' +
                  '<p style="font-size:14px;color:#9ca3af;margin:0 0 16px;line-height:1.6;">O app foi publicado sem as vari&aacute;veis de ambiente do Supabase. Defina-as em <strong>Vercel &rarr; Settings &rarr; Environment Variables</strong> (Production, Preview e Development) e fa&ccedil;a um novo deploy.</p>' +
                  '<code style="display:block;background:#16161d;border:1px solid #2a2a33;border-radius:8px;padding:12px;font-size:13px;color:#a5b4fc;text-align:left;white-space:pre-wrap;">' + faltando.join("\n") + '</code>' +
                '</div>' +
              '</div>';
          }
          // Impede o carregamento do bundle (que cairia em tela branca).
          window.__CONFIG_MISSING__ = faltando;
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
